<!-- Crowd Threat — CTA Buttons Section -->
<!-- Drop this block into the homepage between the logo bar and the "How it works" section -->

<style>
  .cta-section {
    background: transparent;
    padding: 48px 40px;
    font-family: 'Schibsted Grotesk', sans-serif;
  }
  .cta-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    max-width: 900px;
    margin: 0 auto;
  }
  @media (max-width: 640px) {
    .cta-grid {
      grid-template-columns: 1fr;
    }
  }
  .cta-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 28px 20px;
    border: none;
    cursor: pointer;
    text-decoration: none;
    transition: transform 0.15s ease, opacity 0.15s ease;
    position: relative;
    overflow: hidden;
  }
  .cta-btn:hover { transform: translateY(-2px); opacity: 0.92; }
  .cta-btn:active { transform: translateY(0); }
  .cta-btn.primary { background: #FC192E; }
  .cta-btn.secondary {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.2);
  }
  .cta-btn.secondary:hover { border-color: rgba(255,255,255,0.45); }
  .cta-btn.tertiary {
    background: transparent;
    border: 1px solid rgba(252,25,46,0.35);
  }
  .cta-btn.tertiary:hover { border-color: rgba(252,25,46,0.7); }
  .cta-icon {
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .cta-icon svg { width: 28px; height: 28px; }
  .cta-label {
    font-family: 'Schibsted Grotesk', sans-serif;
    font-size: clamp(14px, 1.6vw, 17px);
    font-weight: 700;
    color: #ffffff;
    text-align: center;
    line-height: 1.2;
    letter-spacing: -0.01em;
  }
  .cta-sub {
    font-family: 'Azeret Mono', monospace;
    font-size: 10px;
    color: rgba(255,255,255,0.45);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    text-align: center;
  }
  .cta-btn.primary .cta-sub { color: rgba(255,255,255,0.65); }
</style>

<section class="cta-section">
  <div class="cta-grid">

    <a class="cta-btn primary"
       href="https://app.crowdthreat.world/login"
       target="_blank"
       rel="noopener noreferrer">
      <div class="cta-icon">
        <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="14" cy="10" r="5" stroke="white" stroke-width="1.8"/>
          <path d="M5 24c0-4.418 4.03-8 9-8s9 3.582 9 8" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
          <circle cx="21" cy="8" r="3" fill="#FC192E" stroke="white" stroke-width="1.5"/>
          <path d="M21 6.5v3M19.5 8h3" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="cta-label">Register as a<br>Threat Reporter</div>
      <div class="cta-sub">Join the crowd · get paid</div>
    </a>

    <a class="cta-btn secondary"
       href="https://crowd-threat-49349558.hubspotpagebuilder.com/request-a-demo-of-crowd-threat"
       target="_blank"
       rel="noopener noreferrer">
      <div class="cta-icon">
        <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="4" y="6" width="20" height="14" rx="2" stroke="white" stroke-width="1.8"/>
          <path d="M9 22h10M14 20v2" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
          <circle cx="14" cy="13" r="3" stroke="white" stroke-width="1.6"/>
          <path d="M14 10v-2M14 16v2M17 13h2M11 13H9" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="cta-label">Request<br>a Demo</div>
      <div class="cta-sub">API · subscription · enterprise</div>
    </a>

    <a class="cta-btn tertiary"
       href="https://app.crowdthreat.world/"
       target="_blank"
       rel="noopener noreferrer">
      <div class="cta-icon">
        <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="14" cy="14" r="9" stroke="#FC192E" stroke-width="1.8"/>
          <path d="M5 14h18M14 5c-2.5 3-4 5.5-4 9s1.5 6 4 9M14 5c2.5 3 4 5.5 4 9s-1.5 6-4 9" stroke="#FC192E" stroke-width="1.5"/>
          <circle cx="14" cy="14" r="2" fill="#FC192E"/>
        </svg>
      </div>
      <div class="cta-label">View the Free<br>Threat Map</div>
      <div class="cta-sub">Live · no sign-in required</div>
    </a>

  </div>
</section>
